<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linejoin="round" stroke-linecap="round">
  <!-- Self-contrasting shaded cube: bright top + mid/dark side faces read on both
       light and dark backgrounds without relying on currentColor. -->
  <polygon points="12,2.6 20.7,7.7 12,12.8 3.3,7.7" fill="#7fe3ff" stroke="#1c5f8f" stroke-width="0.7"/>
  <polygon points="3.3,7.7 12,12.8 12,21.4 3.3,16.3" fill="#2f9bd6" stroke="#1c5f8f" stroke-width="0.7"/>
  <polygon points="20.7,7.7 12,12.8 12,21.4 20.7,16.3" fill="#1f6ca6" stroke="#1c5f8f" stroke-width="0.7"/>
</svg>
